name: variable secret workflow

on: push

jobs: 
  build: 
   runs-on: ubuntu-latest 
    steps:
      - name: Docker build
        run: docker built -t docker.io/dockerUsername/imageName:latest

      - name: Docker login
        run: docker login -username=dockerUsername -Password=123456

      - name: Docker push
        run: docker push docker.io/dockerUsername/imageName:latest
  
  Deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Docker run
        run: docker run -d -p 80:80 docker.io/dockerUsername/imageName:latest
