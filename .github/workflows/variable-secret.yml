name: variable secret workflow

on: push

env:
  DOCKER_USERNAME: shameernittur
  DOCKER_PASSWORD: 123456
  container_registry: docker.io
  image_name: github-actions-nginx
jobs: 
  build: 
   runs-on: ubuntu-latest
   steps:
      - name: Docker build
        run: docker built -t $container_registry/${{env. DOCKER_USERNAME }}/ $image_name:latest

      - name: Docker login
        run: docker login --username=${{env. DOCKER_USERNAME }} --password=${{env. DOCKER_PASSWORD }}

      - name: Docker push
        run: docker push $container_registry/${{env. DOCKER_USERNAME }}/$image_name:latest
  
  Deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Docker run
        run: docker run -d -p 80:80 $container_registry/${{env. DOCKER_USERNAME }}/$image_name:latest
