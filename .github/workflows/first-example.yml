name: My first workflow

on: push

jobs:
    build-job:
      runs-on: ubuntu-latest
      steps:
      - name: install cowsay library
        run: sudo apt-get install cowsay -y

      - name: execute cowsay command
        run: cowsay -f dragon " run i'm a dragon" >> dragon.txt

      - name: sleep
        run: sleep 10

    test-job:
      needs: build-job
      runs-on: ubuntu-latest
      steps:
      - name: sleep for 10 sec
        run: sleep 10

      - name: Test file exists
        run: grep -i "dragon" dragon.txt

    Deploy-job:
      needs: test-job
      runs-on: ubuntu-latest
      steps:
      - name: read file
        run: cat dragon.txt

      - name: deploy
        run: echo " deploy "
        